<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1toV2 — Operations as a system</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #FAFAF7;
    --bg-tint: #F4F4EE;
    --ink: #0B0B0A;
    --ink-2: #1A1A18;
    --muted: #6B6B66;
    --muted-2: #9A9A93;
    --line: #E7E7E0;
    --line-2: #D9D9D1;
    --card: #FFFFFF;
    --accent: oklch(0.86 0.22 142);
    --accent-ink: oklch(0.32 0.12 142);
    --accent-soft: oklch(0.94 0.08 142);
    --warn: oklch(0.7 0.16 30);
    --warn-soft: oklch(0.95 0.05 40);
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.5;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-feature-settings: normal; }
  ::selection { background: var(--accent); color: var(--ink); }
  button { font-family: inherit; }
  a { color: inherit; }

  /* Subtle grid backdrop, used sparingly */
  .grid-bg {
    background-image:
      linear-gradient(to right, rgba(11,11,10,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(11,11,10,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
  }
  .noise::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(11,11,10,0.025) 1px, transparent 1px);
    background-size: 4px 4px;
    mix-blend-mode: multiply;
  }

  /* Mobile responsiveness */
  @media (max-width: 880px) {
    .hero-wrap { padding: 56px 20px 16px !important; }
    .hero-status { margin-bottom: 32px !important; }
    .hero-sub { grid-template-columns: 1fr !important; gap: 28px !important; margin-top: 24px !important; }
    .hero-signal { grid-template-columns: repeat(2, 1fr) !important; gap: 20px 0 !important; }
    .hero-signal-cell:nth-child(odd) { border-left: none !important; }
    .hero-signal-cell:nth-child(3) { border-top: 1px dashed var(--line-2); padding-top: 16px !important; }
    .hero-signal-cell:nth-child(4) { border-top: 1px dashed var(--line-2); padding-top: 16px !important; }
    .split-stage { height: 360px !important; }
    section[id] > div { padding: 0 20px !important; }
    section { padding: 72px 0 !important; }
    .pain-grid { grid-template-columns: 1fr !important; }
    .pain-grid > div { border-right: none !important; border-bottom: 1px solid var(--line) !important; }
    .pain-grid > div:last-child { border-bottom: none !important; }
    .pain-cta { flex-direction: column !important; align-items: flex-start !important; }
    .pkg-grid { grid-template-columns: 1fr !important; }
    .pkg-audit { flex-direction: column !important; align-items: flex-start !important; }
    .pkg-card { padding: 28px 22px !important; }
    .build-grid { grid-template-columns: 1fr !important; }
    .workflow-player { grid-template-columns: 1fr !important; }
    .workflow-tabs { flex-direction: column !important; }
    .workflow-tabs button { flex: none !important; border-right: none !important; border-bottom: 1px solid var(--line) !important; }
    .cred-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
    .cred-strip { grid-template-columns: 1fr !important; gap: 20px !important; padding: 24px !important; }
    .process-grid { grid-template-columns: 1fr !important; }
    .process-grid > div { border-right: none !important; border-bottom: 1px solid var(--line) !important; min-height: auto !important; }
    .process-grid > div:last-child { border-bottom: none !important; }
    .cta-grid { grid-template-columns: 1fr !important; gap: 40px !important; padding: 0 20px !important; }
    section#cta { padding: 72px 0 !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px 24px !important; }
    .nav-links { display: none !important; }
    h1.hero-h1 { font-size: clamp(34px, 9vw, 56px) !important; }
  }
  @media (max-width: 520px) {
    .footer-grid { grid-template-columns: 1fr !important; }
    .split-stage { height: 320px !important; }
  }
</style>
<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/nav.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/compare.jsx"></script>
<script type="text/babel" src="components/painpoints.jsx"></script>
<script type="text/babel" src="components/build.jsx"></script>
<script type="text/babel" src="components/workflows.jsx"></script>
<script type="text/babel" src="components/packages.jsx"></script>
<script type="text/babel" src="components/credibility.jsx"></script>
<script type="text/babel" src="components/process.jsx"></script>
<script type="text/babel" src="components/cta.jsx"></script>
<script type="text/babel" src="components/footer.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
